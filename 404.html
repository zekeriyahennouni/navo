<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden — navo</title>
<meta name="theme-color" content="#123B2E">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --green: #123B2E; --cream: #F5EFE6; --ink: #1a1a1a; --ink-soft: #4a4a4a; }
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--cream);
  color: var(--ink);
  font-family: "Inter", system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.wrap { max-width: 520px; text-align: center; }
h1 {
  font-family: "Fraunces", Georgia, serif;
  font-weight: 600;
  color: var(--green);
  font-size: clamp(36px, 6vw, 52px);
  margin: 0 0 16px;
  line-height: 1.1;
}
p { color: var(--ink-soft); margin: 0 0 32px; }
a.button {
  display: inline-block;
  background: var(--green);
  color: var(--cream);
  padding: 14px 28px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 600;
  transition: background 0.2s;
}
a.button:hover { background: #0b2b21; }
.small { margin-top: 24px; font-size: 14px; color: #8a8a8a; }
.small a { color: var(--green); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Hier ist nichts.</h1>
  <p>Die Seite, die du suchst, existiert nicht – oder ist es einer der ersten Schritte, die du dir gerade nicht traust?</p>
  <a class="button" href="/">Zurück zu navo</a>
  <p class="small">
    <a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a>
  </p>
</div>
</body>
</html>
